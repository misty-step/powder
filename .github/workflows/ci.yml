name: Rust CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  fmt-clippy-test:
    name: fmt-clippy-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Leak gate self-test
        run: bash scripts/leak-gate.sh --self-test

      - name: Leak gate scan
        run: bash scripts/leak-gate.sh

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy

      - name: Reject repository-local ticket ledgers
        run: test -z "$(find . -type d -name backlog.d -not -path './.git/*' -print -quit)"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check aesthetic kit currency
        run: bash scripts/check-aesthetic-currency.sh

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  law-gate:
    name: aesthetic law gate (board UI)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build powder-server and powder-cli
        run: cargo build -p powder-server -p powder-cli

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: law/package-lock.json

      - name: Install law-gate dependencies
        run: npm ci
        working-directory: law

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: law

      - name: Run the law gate against the board UI
        run: npm run law
        working-directory: law

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: law-gate-report
          path: law/playwright-report/
          if-no-files-found: ignore

  ui-toolchain-drift:
    name: ui toolchain drift (committed dist)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install ui/ dependencies
        run: npm ci
        working-directory: ui

      - name: Build ui/ into crates/powder-server/static
        run: npm run build
        working-directory: ui

      - name: Fail if the committed dist drifted from a fresh build
        run: |
          if ! git diff --exit-code -- crates/powder-server/static; then
            echo "::error::crates/powder-server/static is out of date -- run 'npm ci && npm run build' in ui/ and commit the result." >&2
            exit 1
          fi
