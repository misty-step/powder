name: Release

# Fires on an annotated/lightweight tag push shaped like a semver release
# (v0.1.0, v1.2.3, ...). Tags are pushed by a human/lead after a merge to
# master, never by this workflow itself.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: build (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Install zig (zigbuild's cross linker/toolchain)
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build release binaries
        run: |
          cargo zigbuild --release --locked --target ${{ matrix.target }} \
            -p powder-server -p powder-cli -p powder-mcp

      - name: Package tarball + checksum
        run: |
          set -euo pipefail
          STAGE="dist/${{ matrix.target }}"
          mkdir -p "$STAGE"
          BIN_DIR="target/${{ matrix.target }}/release"
          cp "$BIN_DIR/powder-server" "$BIN_DIR/powder" "$BIN_DIR/powder-mcp" "$STAGE/"
          TARBALL="powder-${{ matrix.target }}.tar.gz"
          tar -C "$STAGE" -czf "$TARBALL" powder-server powder powder-mcp
          sha256sum "$TARBALL" > "$TARBALL.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: powder-${{ matrix.target }}
          path: |
            powder-${{ matrix.target }}.tar.gz
            powder-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  build-macos:
    name: build (aarch64-apple-darwin)
    # macos-14 runners are Apple Silicon (arm64) hosts, so this is a native
    # build, not a cross-compile -- no zigbuild/cross needed.
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add aarch64-apple-darwin

      - name: Build release binaries
        run: |
          cargo build --release --locked --target aarch64-apple-darwin \
            -p powder-server -p powder-cli -p powder-mcp

      - name: Package tarball + checksum
        run: |
          set -euo pipefail
          STAGE="dist/aarch64-apple-darwin"
          mkdir -p "$STAGE"
          BIN_DIR="target/aarch64-apple-darwin/release"
          cp "$BIN_DIR/powder-server" "$BIN_DIR/powder" "$BIN_DIR/powder-mcp" "$STAGE/"
          TARBALL="powder-aarch64-apple-darwin.tar.gz"
          tar -C "$STAGE" -czf "$TARBALL" powder-server powder powder-mcp
          shasum -a 256 "$TARBALL" > "$TARBALL.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: powder-aarch64-apple-darwin
          path: |
            powder-aarch64-apple-darwin.tar.gz
            powder-aarch64-apple-darwin.tar.gz.sha256
          if-no-files-found: error

  docker:
    name: container image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/misty-step/powder
          tags: |
            type=match,pattern=v(.*),group=1
            type=raw,value=latest

      # linux/amd64 only for now: the Dockerfile compiles Rust inside the
      # build stage, and cross-compiling that under QEMU emulation for
      # linux/arm64 would multiply build time for little gain over a native
      # arm64 binary tarball (already published above). Multi-arch images
      # are a follow-up once there's a native arm64 builder for this step.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: publish GitHub release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List staged assets
        run: ls -la dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
