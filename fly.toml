# DECOMMISSIONED (2026-07-07): the standalone `powder` Fly app was a decoy —
# it was destroyed after its data was verified migrated to the bastion box
# (a separate, operator-owned Fly machine, litestream-replicated; see
# docs/production-deploy.md for where that instance actually runs).
# Deployment is owned by the bastion repo, not this one.
# Do NOT `fly deploy` from this file; it is kept only as a config reference.
app = "powder"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "powder_data"
  destination = "/data"

[env]
  POWDER_DB_PATH = "/data/powder.db"
  # `[::]` is a single dual-stack socket on Fly's guest kernel (confirmed
  # live: it answers a literal 127.0.0.1 connection and traffic tunneled
  # in over `fly proxy`/`.internal`, which is IPv6-only). `fly deploy`
  # prints "app is not listening on 0.0.0.0" for this bind regardless — its
  # scanner only checks the IPv4 socket table, which dual-stack v6 sockets
  # never populate even though they serve v4 traffic fine. That warning is
  # a known cosmetic false positive here (health checks stay 2/2 passing);
  # do not "fix" it by switching to `0.0.0.0`, which binds v4-only and
  # breaks the private (Flycast/`.internal`) path this app depends on.
  POWDER_BIND_ADDR = "[::]:4000"
  POWDER_AUTH_MODE = "api-key"
  POWDER_PUBLIC_BASE_URL = "http://powder.internal:4000"
  POWDER_DISCLOSE_BOOTSTRAP_KEY = "false"
  # Fail boot loudly if Litestream backup configuration is ever missing or
  # incomplete, instead of silently running an unreplicated instance (the
  # entrypoint's default behavior otherwise: a warning on stderr, easy to
  # miss). The required secrets (BUCKET_NAME, AWS_*) are already deployed;
  # see docs/litestream-restore-drill.md for the restore proof and drill.
  POWDER_REQUIRE_LITESTREAM = "1"
  PORT = "4000"

# Flycast-only ingress: deliberately no http_service stanza, since that is
# Fly's public-Anycast-on-80/443 shorthand and would ask flyctl to
# provision a public IP the next time this app deploys without one. This app
# is reached solely over Fly's private network: `powder.internal:4000` (6PN,
# direct machine-to-machine) and `powder.flycast:4000` (Fly Proxy over the
# private network, autostart-aware). The https-forcing option is
# intentionally absent too — Flycast is HTTP-only. `fly ips list --app
# powder` must show no `public` entries; run `bin/check-private-ingress.sh`
# to verify.
[[services]]
  internal_port = 4000
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    handlers = ["http"]
    port = 4000

  [[services.http_checks]]
    grace_period = "15s"
    interval = "30s"
    method = "get"
    path = "/healthz"
    protocol = "http"
    timeout = "5s"

  [[services.http_checks]]
    grace_period = "15s"
    interval = "30s"
    method = "get"
    path = "/readyz"
    protocol = "http"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
