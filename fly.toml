app = "powder"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "powder_data"
  destination = "/data"

[env]
  POWDER_DB_PATH = "/data/powder.db"
  POWDER_BIND_ADDR = "[::]:4000"
  POWDER_AUTH_MODE = "api-key"
  POWDER_PUBLIC_BASE_URL = "http://powder.internal:4000"
  POWDER_DISCLOSE_BOOTSTRAP_KEY = "false"
  PORT = "4000"

# Flycast-only ingress: deliberately no http_service stanza, since that is
# Fly's public-Anycast-on-80/443 shorthand and would ask flyctl to
# provision a public IP the next time this app deploys without one. This app
# is reached solely over Fly's private network: `powder.internal:4000` (6PN,
# direct machine-to-machine) and `powder.flycast:4000` (Fly Proxy over the
# private network, autostart-aware). The https-forcing option is
# intentionally absent too — Flycast is HTTP-only. `fly ips list --app
# powder` must show no `public` entries; run `bin/check-private-ingress.sh`
# to verify.
[[services]]
  internal_port = 4000
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    handlers = ["http"]
    port = 4000

  [[services.http_checks]]
    grace_period = "15s"
    interval = "30s"
    method = "get"
    path = "/healthz"
    protocol = "http"
    timeout = "5s"

  [[services.http_checks]]
    grace_period = "15s"
    interval = "30s"
    method = "get"
    path = "/readyz"
    protocol = "http"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
